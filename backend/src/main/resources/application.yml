server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_assistant?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: campus-assistant-jwt-secret-key-2024-abcdefghijklmnop
  expiration: 86400000

deepseek:
  api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
